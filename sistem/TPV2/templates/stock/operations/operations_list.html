{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Consulta de Operações | Top Plant V2</title>

    <link rel="stylesheet" href="{% static 'css/global.css' %}">

</head>

<body>

{% include 'navbar.html' %}

<div class="container">

    <div class="data-panel">

        <div class="panel-header">

            <h2>Consulta de Operações</h2>

            <button
                class="btn btn-cancel"
                onclick="window.location.href='/stock/'">

                Voltar

            </button>

        </div>

        <div class="stock-filter">

            <input
                id="filterProductCode"
                class="form-control"
                type="text"
                placeholder="Código do Produto">

            <input
                id="filterStockCode"
                class="form-control"
                type="text"
                placeholder="Código do Estoque">

            <input
                id="filterStartDate"
                class="form-control"
                type="date">

            <input
                id="filterEndDate"
                class="form-control"
                type="date">

            <button
                class="btn btn-positive"
                onclick="loadOperations()">

                Consultar

            </button>

            <button
                class="btn btn-cancel"
                onclick="clearFilters()">

                Limpar

            </button>

        </div>

        <div class="table-responsive scroll-table">

            <table class="table">

                <thead>

                    <tr>

                        <th>Estoque</th>
                        <th>Código do Produto</th>
                        <th>Nome do produto</th>
                        <th>Operação</th>
                        <th>Quantidade Antes</th>
                        <th>Quantidade Depois</th>
                        <th>Data/Hora</th>

                    </tr>

                </thead>

                <tbody id="operationsTable">

                    <tr>

                        <td
                            colspan="6"
                            style="text-align:center;">

                            Utilize os filtros acima para consultar as operações.

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<div
    id="toastContainer"
    class="toast-container">

</div>

<script src="{% static 'js/operations_list.js' %}"></script>

</body>

</html>
