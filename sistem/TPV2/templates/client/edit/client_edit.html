{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Modificar Cliente | Top Plant V2</title>

    <link rel="stylesheet" href="{% static 'css/global.css' %}">

    <style>

        .form-control.input-error{
            border-color:var(--color-danger);
            background:#FFFAFA;
        }

        .form-control.input-error:focus{
            box-shadow:0 0 0 3px rgba(139,0,0,.10);
        }

        .error-message{
            display:none;
            margin-top:.3rem;
            color:var(--color-danger);
            font-size:.8rem;
            font-weight:600;
        }

    </style>

</head>

<body>

{% include 'navbar.html' %}

<div class="container">

    <div class="data-panel">

        <div class="panel-header">
            <h2>Modificar Cliente</h2>
        </div>

        <div class="form-grid">

            <div class="form-group">

                <label class="form-label">
                    Código
                </label>

                <input
                    id="editCode"
                    type="text"
                    class="form-control"
                    placeholder="Carregando...">

                <span
                    id="errCode"
                    class="error-message">
                </span>

            </div>

            <div class="form-group">

                <label class="form-label">
                    Nome
                </label>

                <input
                    id="editName"
                    type="text"
                    class="form-control"
                    placeholder="Carregando...">

                <span
                    id="errName"
                    class="error-message">
                </span>

            </div>

            <div class="form-group">

                <label class="form-label">
                    Tipo do Documento
                </label>

                <input
                    id="editDocType"
                    type="text"
                    class="form-control"
                    placeholder="CPF ou CNPJ">

                <span
                    id="errDocType"
                    class="error-message">
                </span>

            </div>

            <div class="form-group">

                <label class="form-label">
                    Documento
                </label>

                <input
                    id="editDoc"
                    type="text"
                    class="form-control"
                    placeholder="CPF ou CNPJ">

                <span
                    id="errDoc"
                    class="error-message">
                </span>

            </div>

            <div class="form-group">

                <label class="form-label">
                    Contato
                </label>

                <input
                    id="editContact"
                    type="text"
                    class="form-control"
                    placeholder="Telefone">

                <span
                    id="errContact"
                    class="error-message">
                </span>

            </div>

            <div class="form-group">

                <label class="form-label">
                    Email
                </label>

                <input
                    id="editEmail"
                    type="email"
                    class="form-control"
                    placeholder="email@dominio.com">

                <span
                    id="errEmail"
                    class="error-message">
                </span>

            </div>

            <div class="form-group">

                <label class="form-label">
                    Inscrição Estadual
                </label>

                <input
                    id="editStateRegister"
                    type="text"
                    class="form-control"
                    placeholder="Inscrição Estadual">

                <span
                    id="errStateRegister"
                    class="error-message">
                </span>

            </div>

        </div>

        <div
            class="stock-actions"
            style="margin-top:2rem;justify-content:flex-end;">

            <a
                href="/client/"
                class="btn btn-cancel">

                Cancelar

            </a>

            <button
                class="btn btn-positive"
                type="submit" 
                onclick="updateClient(event)">

                Salvar Alterações

            </button>

        </div>

    </div>

</div>

<div
    id="toastContainer"
    class="toast-container">
</div>

<script src="{% static 'js/client_edit.js' %}"></script>

</body>
</html>
