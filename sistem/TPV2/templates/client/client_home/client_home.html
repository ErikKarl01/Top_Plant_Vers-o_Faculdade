{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Clientes | Top Plant V2</title>
    
    <link rel="stylesheet" href="{% static 'css/global.css' %}">

    <style>
        /* ESTILOS EXCLUSIVOS DA TABELA (Garante o layout perfeito que você pediu) */
        .scroll-table-large {
            max-height: 600px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            background-color: #fff;
        }

        #clientsTable {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        #clientsTable th, #clientsTable td {
            padding: 10px 12px;
            vertical-align: middle;
            border-bottom: 1px solid #e2e8f0;
        }

        /* 1. Cabeçalho Fixo Principal (Clientes) no topo */
        .header-client th {
            background-color: #1b3d22 !important;
            color: #ffffff !important;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        /* 2. Linha de Dados do Cliente */
        .client-row td {
            background-color: #ffffff;
            color: #1a202c;
            font-size: 0.90rem;
            font-weight: 500;
            border-top: 3px solid #cbd5e1; /* Separação grossa entre os clientes */
        }

        /* 3. Cabeçalho de Endereço (Injetado via JS para cada cliente) */
        .address-header-row td.inner-header {
            background-color: #3f4a56 !important;
            color: #ffffff !important;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.80rem;
            padding: 6px 12px !important;
            border-bottom: none !important;
        }

        /* 4. Linha de Dados do Endereço */
        .address-data-row td {
            background-color: #f7fafc;
            color: #4a5568;
            font-size: 0.85rem;
        }

        /* Destaque ao Selecionar (Aplica nas 3 linhas do bloco) */
        .selected-row td, .selected-row th {
            background-color: #dbeafe !important; /* Azul bem clarinho para indicar seleção */
            color: #1e3a8a !important;
        }
    </style>
</head>

<body>

{% include 'navbar.html' %}

<div class="container">
    <div class="data-panel">
        <div class="panel-header">
            <h2>Cadastro de Clientes</h2>
        </div>

        <div class="stock-filter">
            <input type="text" id="filterCode" class="form-control" placeholder="Código">
            <input type="text" id="filterName" class="form-control" placeholder="Nome">
            <button class="btn btn-positive" onclick="filterClients()">Filtrar</button>
            <button class="btn btn-cancel" onclick="clearFilters()">Limpar</button>
        </div>

        <div class="table-responsive scroll-table-large">
            <table class="table" id="clientsTable">
                <thead>
                    <tr class="header-client">
                        <th>Código</th>
                        <th>Nome</th>
                        <th>Tipo de documento</th>
                        <th>Documento</th>
                        <th>Registro Estadual</th>
                        <th>Contato</th>
                        <th>Email</th>
                    </tr>
                </thead>

                <tbody id="clientsTableBody">
                    <tr>
                        <td colspan="7" style="text-align:center; padding:2rem;">
                            Carregando...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="stock-actions" style="margin-top:2rem; justify-content:center; flex-wrap:wrap; gap:.8rem;">
        <a href="{% url 'template_client_register' %}" class="btn btn-positive">Cadastrar Cliente</a>
        <button id="btnEdit" class="btn btn-positive" disabled onclick="goToEdit()">Modificar Cliente</button>
        <button id="btnDelete" class="btn btn-danger" disabled onclick="openDeleteModal()">Excluir Cliente</button>
    </div>
    <div class="stock-actions" style="margin-top:1rem; justify-content:center; flex-wrap:wrap; gap:.8rem;">
        <button id="btnAdress" class="btn btn-positive" disabled onclick="goToAdressRegister()">Cadastrar Endereço</button>
        <button id="btnEditAdress" class="btn btn-positive" disabled onclick="goToAdressEdit()">Modificar Endereço</button>
    </div>
</div>

<div class="modal-overlay" id="securityModal" style="display: none;">
    <div class="modal-box">
        <h3>Confirmação Necessária</h3>
        <p>Para excluir este cliente digite <strong>confirmar</strong>.</p>
        <input id="confirmInput" class="form-control" type="text" autocomplete="off" placeholder="Digite confirmar" style="text-align:center; font-weight:bold; margin-bottom:1.5rem;">
        <div class="stock-actions" style="justify-content:center;">
            <button class="btn btn-cancel" onclick="closeModal()">Cancelar</button>
            <button id="btnConfirmAction" class="btn btn-danger" disabled>Confirmar</button>
        </div>
    </div>
</div>

<div id="toastContainer" class="toast-container"></div>
<script src="{% static 'js/client_list.js' %}?v=10"></script>
</body>
</html>
