{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastrar Cliente | Top Plant V2</title>

    <link rel="stylesheet" href="{% static 'css/global.css' %}">

    <style>

        .form-control.input-error{
            border-color:var(--color-danger);
            background:#FFFAFA;
        }

        .form-control.input-error:focus{
            box-shadow:0 0 0 3px rgba(139,0,0,.10);
        }

        .error-message{
            color:var(--color-danger);
            font-size:.80rem;
            font-weight:600;
            margin-top:.30rem;
            display:none;
        }

    </style>

</head>

<body>

{% include 'navbar.html' %}

<div class="container">

    <div class="data-panel">

        <div class="panel-header">
            <h2>Novo Cliente</h2>
        </div>

        <div class="form-grid">

            <div class="form-group">

                <label class="form-label">
                    Código
                </label>

                <input
                    id="regCode"
                    class="form-control"
                    type="text"
                    placeholder="Ex: CL001">

                <span
                    id="errCode"
                    class="error-message">
                </span>

            </div>

            <div class="form-group">

                <label class="form-label">
                    Nome
                </label>

                <input
                    id="regName"
                    class="form-control"
                    type="text"
                    placeholder="Nome completo">

                <span
                    id="errName"
                    class="error-message">
                </span>

            </div>

            <div class="form-group">

                <label class="form-label">
                    Tipo de Documento
                </label>

                <select
                    id="regDocType"
                    class="form-control">

                    <option value="CPF">
                        CPF
                    </option>

                    <option value="CNPJ">
                        CNPJ
                    </option>

                </select>

                <span
                    id="errDocType"
                    class="error-message">
                </span>

            </div>

            <div class="form-group">

                <label class="form-label">
                    Documento
                </label>

                <input
                    id="regDoc"
                    class="form-control"
                    type="text"
                    placeholder="CPF ou CNPJ">

                <span
                    id="errDoc"
                    class="error-message">
                </span>

            </div>

            <div class="form-group">

                <label class="form-label">
                    Contato
                </label>

                <input
                    id="regContact"
                    class="form-control"
                    type="text"
                    placeholder="Telefone">

                <span
                    id="errContact"
                    class="error-message">
                </span>

            </div>

            <div class="form-group">

                <label class="form-label">
                    Email
                </label>

                <input
                    id="regEmail"
                    class="form-control"
                    type="email"
                    placeholder="email@empresa.com">

                <span
                    id="errEmail"
                    class="error-message">
                </span>

            </div>

            <div class="form-group">

                <label class="form-label">
                    Inscrição Estadual
                </label>

                <input
                    id="regStateRegister"
                    class="form-control"
                    type="text"
                    placeholder="Obrigatória para CNPJ">

                <span
                    id="errStateRegister"
                    class="error-message">
                </span>

            </div>

        </div>

        <div
            class="stock-actions"
            style="margin-top:2rem;justify-content:flex-end;">

            <a
                href="/client/"
                class="btn btn-cancel">

                Voltar

            </a>

            <button
                class="btn btn-positive"
                onclick="submitClient()">

                Cadastrar Cliente

            </button>

        </div>

    </div>

</div>

<div
    id="toastContainer"
    class="toast-container">
</div>

<script src="{% static 'js/client_register.js' %}"></script>

</body>
</html>
