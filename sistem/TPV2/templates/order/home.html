{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Pedidos | Top Plant V2</title>
    <link rel="stylesheet" href="{% static 'css/global.css' %}?v=1">
</head>

<body>

{% include 'navbar.html' %}

<div class="container">
    <div class="data-panel">
        <div class="panel-header">
            <h2>Gerenciar Pedidos</h2>
        </div>

        <div class="orders-filter-container">
            <div class="orders-filter-group">
                <label class="form-label">Código do Cliente</label>
                <input type="text" id="filterClient" class="form-control" placeholder="Ex: CLI01">
                <span id="errFilterClient" class="error-message"></span>
            </div>

            <div class="orders-filter-group">
                <label class="form-label">Status</label>
                <select id="filterStatus" class="form-control">
                    <option value="">Todos os Status</option>
                    <option value="PENDENTE">Pendente</option>
                    <option value="PARCIALMENTE ATENDIDO">Parcialmente Atendido</option>
                    <option value="FINALIZADO">Finalizado</option>
                </select>
                <span id="errFilterStatus" class="error-message"></span>
            </div>

            <div class="orders-filter-group">
                <label class="form-label">Data Inicial</label>
                <input type="date" id="filterStart" class="form-control">
                <span id="errFilterStart" class="error-message"></span>
            </div>

            <div class="orders-filter-group">
                <label class="form-label">Data Final</label>
                <input type="date" id="filterEnd" class="form-control">
                <span id="errFilterEnd" class="error-message"></span>
            </div>

            <div class="orders-filter-actions">
                <button class="btn btn-positive" onclick="filterOrders()">Filtrar</button>
                <button class="btn btn-cancel" onclick="clearFilters()">Limpar</button>
            </div>
        </div>

        <div class="orders-scroll" id="ordersTableBody">
            <div style="padding:3rem;text-align:center;color:#555;">
                Carregando pedidos...
            </div>
        </div>
    </div>

    <div class="stock-actions" style="justify-content: center; margin-top: 2rem;">
        <button class="btn btn-positive" onclick="goToRegister()">Cadastrar Pedido</button>
        <button id="btnUpdate" class="btn btn-positive" disabled onclick="goToUpdate()">Atualizar Pedido</button>
        <button id="btnDelete" class="btn btn-danger" disabled onclick="openDeleteModal()">Excluir Pedido</button>
        <button class="btn btn-positive" onclick="goToSnapshots()">Snapshots</button>
    </div>
</div>

<div class="modal-overlay" id="securityModal">
    <div class="modal-box">
        <h3>Confirmação Necessária</h3>
        <p>Para excluir este pedido digite <strong>confirmar</strong>.</p>
        
        <input id="confirmInput" class="form-control" type="text" autocomplete="off" placeholder="Digite confirmar" style="text-align:center; font-weight:bold; margin-bottom:1.5rem;">
        <span id="errConfirm" class="error-message" style="margin-top: -1rem; margin-bottom: 1rem; text-align: center;"></span>

        <div class="stock-actions" style="margin-top:0; justify-content: center;">
            <button class="btn-modal-cancel" onclick="closeModal()">Cancelar</button>
            <button id="btnConfirmAction" class="btn btn-danger" disabled onclick="deleteOrder()">Confirmar</button>
        </div>
    </div>
</div>

<div id="toastContainer" class="toast-container"></div>

<script src="{% static 'js/order_home.js' %}?v=1"></script>

</body>
</html>
