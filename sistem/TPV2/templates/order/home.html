{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Gerenciar Pedidos | Top Plant V2</title>

    <link rel="stylesheet"
          href="{% static 'css/global.css' %}">

    <style>

        .orders-scroll{

            max-height:75vh;
            overflow-y:auto;

            padding:1rem;

            display:flex;
            flex-direction:column;
            gap:1.8rem;

        }

        .order-card{

            width:100%;
            background:#fff;

            border:1px solid #dcdcdc;
            border-radius:8px;

            overflow:hidden;

            box-shadow:0 2px 8px rgba(0,0,0,.08);

            cursor:pointer;

            transition:.2s;

        }

        .order-card:hover{

            transform:translateY(-2px);

            box-shadow:0 5px 18px rgba(0,0,0,.12);

        }

        .order-card.selected{

            border:3px solid #1f6f43;

        }

        .order-header{

            background:#1f6f43;
            color:white;

            padding:.7rem 1rem;

            font-weight:bold;

            font-size:17px;

        }

        .order-table{

            width:100%;
            table-layout:fixed;
            border-collapse:collapse;

        }

        .order-table th{

            background:#2d8c55;

            color:white;

            padding:10px;

            text-align:center;

        }

        .order-table td{

            padding:10px;

            text-align:center;

            border-bottom:1px solid #ececec;

        }

        .items-title{

            background:#0b4d78;

            color:white;

            padding:.65rem;

            font-weight:bold;

            text-align:center;

            border-top:2px solid #fff;

        }

        .items-table{

            width:100%;
            table-layout:fixed;
            border-collapse:collapse;

        }

        .items-table th{

            background:#13679e;

            color:white;

            padding:10px;

            text-align:center;

        }

        .items-table td{

            padding:10px;

            text-align:center;

            border-bottom:1px solid #ececec;

        }

        .item-empty{

            text-align:center;

            color:#777;

            padding:18px;

        }

    </style>

</head>

<body>

{% include 'navbar.html' %}

<div class="container">

<div class="data-panel">

<div class="panel-header">

<h2>Gerenciar Pedidos</h2>

</div>

<div class="stock-filter">

<input
type="text"
id="filterClient"
class="form-control"
placeholder="Código do Cliente">

<select
id="filterStatus"
class="form-control">

<option value="">Todos os Status</option>
<option value="PENDENTE">Pendente</option>
<option value="PARCIALMENTE ATENDIDO">Parcialmente Atendido</option>
<option value="FINALIZADO">Finalizado</option>

</select>

<input
type="date"
id="filterStart"
class="form-control">

<input
type="date"
id="filterEnd"
class="form-control">

<button
class="btn btn-positive"
onclick="filterOrders()">

Filtrar

</button>

<button
class="btn btn-cancel"
onclick="clearFilters()">

Limpar

</button>

</div>

<div
class="orders-scroll"
id="ordersTableBody">

<div style="padding:3rem;text-align:center;">

Carregando...

</div>

</div>

</div>
<div
    class="stock-actions"
    style="
        margin-top:2rem;
        justify-content:center;
        flex-wrap:wrap;
        gap:.8rem;
    ">

    <button
        class="btn btn-positive"
        onclick="goToRegister()">

        Cadastrar Pedido

    </button>

    <button
        id="btnUpdate"
        class="btn btn-positive"
        disabled
        onclick="goToUpdate()">

        Atualizar Pedido

    </button>

    <button
        id="btnDelete"
        class="btn btn-danger"
        disabled
        onclick="openDeleteModal()">

        Excluir Pedido

    </button>

    <button
        class="btn btn-positive"
        onclick="goToSnapshots()">

        Snapshots

    </button>

</div>

</div>

<!-- ===================================================== -->
<!-- MODAL DE CONFIRMAÇÃO -->
<!-- ===================================================== -->

<div
    class="modal-overlay"
    id="securityModal">

    <div class="modal-box">

        <h3>

            Confirmação Necessária

        </h3>

        <p>

            Para excluir este pedido digite
            <strong>confirmar</strong>.

        </p>

        <input
            id="confirmInput"
            class="form-control"
            type="text"
            autocomplete="off"
            placeholder="Digite confirmar"
            style="
                text-align:center;
                font-weight:bold;
                margin-bottom:1.5rem;
            ">

        <div
            class="stock-actions"
            style="justify-content:center;">

            <button
                class="btn btn-cancel"
                onclick="closeModal()">

                Cancelar

            </button>

            <button
                id="btnConfirmAction"
                class="btn btn-danger"
                disabled>

                Confirmar

            </button>

        </div>

    </div>

</div>

<div
    id="toastContainer"
    class="toast-container">

</div>

<script src="{% static 'js/order_home.js' %}"></script>

</body>
</html>
