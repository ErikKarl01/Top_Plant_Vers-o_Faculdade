{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapshots | Top Plant V2</title>
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
</head>
<body>

{% include 'navbar.html' %}

<div class="container">
    <div class="data-panel">
        <div class="panel-header">
            <h2>Gerenciar Snapshots</h2>
        </div>

        <div class="table-responsive scroll-table">
            <table class="table">
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Código Produto</th>
                        <th>Produto</th>
                        <th>Preço</th>
                        <th>Desconto</th>
                    </tr>
                </thead>
                <tbody id="snapshotsTableBody">
                    <tr>
                        <td colspan="5" style="text-align:center;padding:2rem;">
                            Carregando...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="editPanel" class="data-panel" style="margin-top:2rem;display:none;">
        <div class="panel-header">
            <h2>Editar Snapshot</h2>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label class="form-label">Código</label>
                <input id="editCode" class="form-control" readonly>
            </div>

            <div class="form-group">
                <label class="form-label">Produto</label>
                <input id="editProduct" class="form-control" readonly>
            </div>

            <div class="form-group">
                <label class="form-label">Preço</label>
                <input id="editPrice" type="number" step="0.01" class="form-control">
            </div>

            <div class="form-group">
                <label class="form-label">Desconto</label>
                <input id="editDiscount" type="number" step="0.01" class="form-control">
            </div>
        </div>

        <div class="stock-actions" style="margin-top:2rem;justify-content:flex-end;">
            <button class="btn btn-cancel" onclick="cancelEdition()">
                Cancelar
            </button>
            <button class="btn btn-positive" onclick="updateSnapshot()">
                Salvar Alterações
            </button>
        </div>
    </div>
</div>

<div id="toastContainer" class="toast-container"></div>

<script src="{% static 'js/snapshot.js' %}"></script>

</body>
</html>
