{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapshots | Top Plant V2</title>
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
</head>
<body>

{% include 'navbar.html' %}

<div class="container">
    <div style="margin-bottom: 1.5rem;">
        <button class="btn btn-cancel" onclick="goBack()">
            <i class="fa-solid fa-arrow-left"></i> Voltar
        </button>
    </div>

    <div class="data-panel">
        <div class="panel-header">
            <h2>Gerenciar Snapshots (Escolha Um Snapshot)</h2>
        </div>

        <div class="table-responsive scroll-table">
            <table class="table">
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Código Produto</th>
                        <th>Produto</th>
                        <th>Unidade</th> 
                        <th>Preço</th>
                        <th>Desconto</th>
                    </tr>
                </thead>
                <tbody id="snapshotsTableBody">
                    <tr>
                        <td colspan="6" style="text-align:center;padding:2rem;">Carregando...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="editPanel" class="data-panel" style="margin-top:2rem;display:none;">
        <div class="panel-header">
            <h2>Editar Snapshot</h2>
        </div>

        <div style="background-color: #f8faf9; padding: 1.5rem; border-radius: 8px; border-left: 4px solid #1a4f28; margin-bottom: 1.5rem;">
            <p style="margin: 0 0 0.5rem 0;"><strong>Código do Snapshot:</strong> <span id="infoCode">-</span></p>
            <p style="margin: 0 0 0.5rem 0;"><strong>Produto:</strong> <span id="infoProduct">-</span></p>
            <p style="margin: 0;"><strong>Medida:</strong> <span id="infoMeasure">-</span></p>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label class="form-label">Preço (R$)</label>
                <input id="editPrice" type="number" step="0.01" class="form-control" placeholder="Ex: 15.50">
            </div>

            <div class="form-group">
                <label class="form-label">Desconto (R$)</label>
                <input id="editDiscount" type="number" step="0.01" class="form-control" placeholder="Ex: 2.00">
            </div>
        </div>

        <div class="stock-actions" style="margin-top:2rem;justify-content:flex-end; display: flex; gap: 0.5rem;">
            <button class="btn btn-cancel" onclick="cancelEdition()">Cancelar</button>
            <button class="btn btn-positive" onclick="updateSnapshot()">Salvar Alterações</button>
        </div>
    </div>
</div>

<div id="toastContainer" class="toast-container"></div>

<script src="{% static 'js/snapshot.js' %}"></script>

</body>
</html>
