{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Atualizar Pedido | Top Plant V2</title>

    <link rel="stylesheet" href="{% static 'css/global.css' %}">

</head>

<body>

{% include 'navbar.html' %}

<div class="container">

    <!-- =========================================== -->
    <!-- DADOS DO PEDIDO -->
    <!-- =========================================== -->

    <div class="data-panel">

        <div class="panel-header">

            <h2>Atualizar Pedido</h2>

        </div>

        <div class="form-grid">

            <div class="form-group">

                <label class="form-label">

                    Código do Pedido

                </label>

                <input
                    id="orderCode"
                    class="form-control"
                    type="text"
                    readonly>

            </div>

            <div class="form-group">

                <label class="form-label">

                    Código do Cliente

                </label>

                <input
                    id="clientCode"
                    class="form-control"
                    type="text"
                    readonly>

            </div>

            <div class="form-group">

                <label class="form-label">

                    Cliente

                </label>

                <input
                    id="clientName"
                    class="form-control"
                    type="text"
                    readonly>

            </div>

            <div class="form-group">

                <label class="form-label">

                    Status

                </label>

                <input
                    id="orderStatus"
                    class="form-control"
                    type="text"
                    readonly>

            </div>

        </div>

    </div>

    <!-- =========================================== -->
    <!-- ITENS -->
    <!-- =========================================== -->

    <div
        class="data-panel"
        style="margin-top:2rem;">

        <div class="panel-header">

            <h2>Itens do Pedido</h2>

        </div>

        <div class="table-responsive scroll-table">

            <table class="table">

                <thead>

                    <tr>

                        <th>Código</th>
                        <th>Produto</th>
                        <th>Quantidade Atual</th>
                        <th>Nova Quantidade</th>
                        <th>Preço</th>
                        <th>Desconto</th>

                    </tr>

                </thead>

                <tbody id="orderItemsTableBody">

                    <tr>

                        <td
                            colspan="6"
                            style="text-align:center;padding:2rem;">

                            Carregando...

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

    <!-- =========================================== -->
    <!-- ALTERAÇÃO -->
    <!-- =========================================== -->

    <div
        class="data-panel"
        style="margin-top:2rem;">

        <div class="panel-header">

            <h2>Adicionar Baixa ao Item</h2>

        </div>

        <div class="form-grid">

            <div class="form-group">

                <label class="form-label">

                    Produto Selecionado

                </label>

                <input
                    id="selectedProduct"
                    class="form-control"
                    type="text"
                    readonly>

            </div>

            <div class="form-group">

                <label class="form-label">

                    Quantidade Atual

                </label>

                <input
                    id="currentAmount"
                    class="form-control"
                    type="text"
                    readonly>

            </div>

            <div class="form-group">

                <label class="form-label">

                    Quantidade Atendida

                </label>

                <input
                    id="removeAmount"
                    class="form-control"
                    type="number"
                    min="1">

            </div>

        </div>

        <div
            class="stock-actions"
            style="margin-top:1.5rem;justify-content:center;">

            <button
                class="btn btn-positive"
                onclick="addUpdate()">

                Adicionar Alteração

            </button>

        </div>

    </div>

    <!-- =========================================== -->
    <!-- BOTÕES -->
    <!-- =========================================== -->

    <div
        class="stock-actions"
        style="margin-top:2rem;justify-content:center;gap:1rem;flex-wrap:wrap;">

        <button
            class="btn btn-cancel"
            onclick="cancelUpdate()">

            Cancelar

        </button>

        <button
            class="btn btn-positive"
            onclick="updateOrder()">

            Salvar Atualização

        </button>

    </div>

</div>

<div
    id="toastContainer"
    class="toast-container">

</div>

<script src="{% static 'js/order_update.js' %}"></script>

</body>
</html>
